services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: always
    environment:
      - DOCKER_API_VERSION=1.41
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global HTTP to HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # ACME configuration
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=qkddpgur318@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - blog-network

  frontend:
    image: ghcr.io/yehyeokbang/blog-frontend:${FRONTEND_IMAGE_TAG:?FRONTEND_IMAGE_TAG is required}
    container_name: blog-frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`blog.yehyeok.xyz`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - blog-network

  backend:
    image: ghcr.io/yehyeokbang/blog-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    container_name: blog-backend
    restart: always
    volumes:
      - "/opt/blog/data/blog.db:/data/blog.db"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`blog.yehyeok.xyz`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.routers.comment-write.rule=Host(`blog.yehyeok.xyz`) && Method(`POST`) && PathRegexp(`^/api/posts/[^/]+/comments/?$`)"
      - "traefik.http.routers.comment-write.priority=200"
      - "traefik.http.routers.comment-write.entrypoints=websecure"
      - "traefik.http.routers.comment-write.tls.certresolver=myresolver"
      - "traefik.http.routers.comment-write.middlewares=comment-write-rate-limit"
      - "traefik.http.middlewares.comment-write-rate-limit.ratelimit.average=5"
      - "traefik.http.middlewares.comment-write-rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.comment-write-rate-limit.ratelimit.burst=3"
      - "traefik.http.middlewares.comment-write-rate-limit.ratelimit.sourcecriterion.ipstrategy.depth=0"
      - "traefik.http.routers.like-write.rule=Host(`blog.yehyeok.xyz`) && (Method(`PUT`) || Method(`DELETE`)) && PathRegexp(`^/api/posts/[^/]+/like/?$`)"
      - "traefik.http.routers.like-write.priority=200"
      - "traefik.http.routers.like-write.entrypoints=websecure"
      - "traefik.http.routers.like-write.tls.certresolver=myresolver"
      - "traefik.http.routers.like-write.middlewares=like-write-rate-limit"
      - "traefik.http.middlewares.like-write-rate-limit.ratelimit.average=10"
      - "traefik.http.middlewares.like-write-rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.like-write-rate-limit.ratelimit.burst=5"
      - "traefik.http.middlewares.like-write-rate-limit.ratelimit.sourcecriterion.ipstrategy.depth=0"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
