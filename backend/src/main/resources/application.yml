spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:sqlite:/data/blog.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  engagement:
    allowed-origins: https://blog.yehyeok.xyz
    cookie-secure: true
