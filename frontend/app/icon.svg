<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#008A63"/>
  <!-- Terminal prompt: "> _" -->
  <!-- Chevron ">" -->
  <polyline
    points="7,11 13,16 7,21"
    fill="none"
    stroke="white"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Cursor underscore "_" -->
  <line
    x1="16"
    y1="21"
    x2="25"
    y2="21"
    stroke="white"
    stroke-width="2.8"
    stroke-linecap="round"
  />
</svg>
