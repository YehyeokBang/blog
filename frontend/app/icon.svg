<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background matching OG image theme -->
  <rect width="32" height="32" rx="7" fill="#0F1923"/>
  <!-- Terminal prompt: "> _" in mint-teal matching OG accent color -->
  <!-- Chevron ">" -->
  <polyline
    points="7,11 13,16 7,21"
    fill="none"
    stroke="#00C896"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Cursor underscore "_" -->
  <line
    x1="16"
    y1="21"
    x2="25"
    y2="21"
    stroke="#00C896"
    stroke-width="2.8"
    stroke-linecap="round"
  />
</svg>
