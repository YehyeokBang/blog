name: SQLite Backup

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: [self-hosted, ARM64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SQLite backup
        run: |
          sudo env DATABASE=/opt/blog/data/blog.db BACKUP_DIRECTORY=/opt/blog/backups \
            /opt/blog/scripts/backup-sqlite.sh
