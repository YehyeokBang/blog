name: Deploy Blog to Oracle Cloud VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      backend_image_tag:
        description: 'rollback할 backend image tag (일반 배포에서는 비워 둠)'
        required: false
        type: string

concurrency:
  group: blog-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: yehyeokbang/blog-frontend
  BACKEND_IMAGE: yehyeokbang/blog-backend

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'content/posts/**'
            backend:
              - 'backend/**'
              - 'content/posts/**'
            deploy:
              - 'frontend/**'
              - 'backend/**'
              - 'content/posts/**'
              - 'docker-compose.yml'
              - 'scripts/**'
              - '.github/workflows/deploy.yml'

  build-frontend:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_SITE_URL: https://blog.yehyeok.xyz
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
        run: npm run build
        working-directory: frontend
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Generate post manifest and build backend JAR
        run: |
          node scripts/generate-posts-manifest.mjs
          cd backend
          ./gradlew bootJar
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build-frontend, build-backend]
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy == 'true') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
    runs-on: [self-hosted, ARM64]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Compose and host prerequisites
        run: |
          docker compose up --help | grep -- '--wait'
          command -v sqlite3
          command -v flock
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install deployment files and prepare SQLite mount
        run: |
          sudo install -d -m 0755 /opt/blog /opt/blog/data /opt/blog/backups /opt/blog/scripts
          sudo install -m 0644 docker-compose.yml /opt/blog/docker-compose.yml
          sudo install -m 0755 scripts/backup-sqlite.sh /opt/blog/scripts/backup-sqlite.sh
          sudo install -m 0755 scripts/migrate-sqlite.sh /opt/blog/scripts/migrate-sqlite.sh
          sudo install -d -m 0755 /opt/blog/migrations/migration
          sudo install -m 0644 backend/src/main/resources/db/migration/*.sql /opt/blog/migrations/migration/
          sudo touch /opt/blog/data/blog.db
          sudo chown -R 10001:10001 /opt/blog/data
          sudo chown -R "$USER":"$(id -gn)" /opt/blog/backups /opt/blog/scripts
      - name: Backup and migrate SQLite before backend replacement
        run: |
          sudo env DATABASE=/opt/blog/data/blog.db BACKUP_DIRECTORY=/opt/blog/backups /opt/blog/scripts/backup-sqlite.sh
          sudo env DATABASE=/opt/blog/data/blog.db MIGRATION_DIRECTORY=/opt/blog/migrations/migration /opt/blog/scripts/migrate-sqlite.sh
      - name: Deploy and wait for health checks
        env:
          FRONTEND_IMAGE_TAG: sha-${{ github.sha }}
          BACKEND_IMAGE_TAG: ${{ inputs.backend_image_tag || format('sha-{0}', github.sha) }}
        run: |
          cd /opt/blog
          printf 'FRONTEND_IMAGE_TAG=%s\nBACKEND_IMAGE_TAG=%s\n' "$FRONTEND_IMAGE_TAG" "$BACKEND_IMAGE_TAG" | sudo tee /opt/blog/.env >/dev/null
          docker compose pull
          if ! docker compose up -d --wait --wait-timeout 120; then
            docker compose ps
            docker compose logs --tail=200 backend
            exit 1
          fi
