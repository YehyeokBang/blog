name: Deploy MVP Frontend to Oracle Cloud VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yehyeokbang/blog-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_SITE_URL: https://${{ secrets.DOMAIN }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
        run: |
          cd frontend
          npm run build

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload docker-compose.yml
        uses: actions/upload-artifact@v4
        with:
          name: compose-file
          path: docker-compose.yml

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Download docker-compose.yml
        uses: actions/download-artifact@v4
        with:
          name: compose-file
          path: /opt/blog

      - name: Deploy to VPS
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          # Ensure the deployment directory exists
          mkdir -p /opt/blog
          cd /opt/blog
          
          # GitHub Secret으로 넘겨받은 DOMAIN을 서버의 .env 파일로 저장
          echo "DOMAIN=$DOMAIN" > .env
          
          # Pull the newly pushed frontend docker image
          docker compose pull frontend
          
          # Restart/Deploy containers in background
          docker compose up -d
          
          # Clean up old dangling unused images to save disk space
          docker image prune -f
